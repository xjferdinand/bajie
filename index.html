<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#b00000" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="八戒X值匹配">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>八戒X值智能匹配</title>

  <style>
    :root{
      --bg:#0b0b0f;
      --card:#11111a;
      --line:rgba(255,255,255,.10);
      --text:#f5f5f7;
      --muted:rgba(255,255,255,.65);
      --red:#ff2d2d;
      --green:#2ecc71;
      --yellow:#f1c40f;
      --blue:#4da3ff;
      --redSoft:#ff8c8c;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(800px 400px at 50% 20%, rgba(255,45,45,.18), transparent 60%),
        radial-gradient(900px 500px at 50% 120%, rgba(176,0,0,.22), transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      padding:18px;
    }
    .app{width:min(820px,100%)}
    .title{
      font-size:24px;
      font-weight:900;
      margin:0 0 12px;
      display:flex;
      align-items:center;
      gap:10px;
      letter-spacing:.3px;
    }
    .title::before{
      content:"";
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--red);
      box-shadow:0 0 18px rgba(255,45,45,.8);
    }
    .panel{
      background:linear-gradient(180deg, rgba(255,45,45,.08), transparent 50%), var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      box-shadow:0 18px 60px rgba(0,0,0,.55);
    }
    input{
      width:100%;
      padding:14px 14px;
      font-size:20px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.35);
      color:var(--text);
      outline:none;
    }
    input:focus{
      border-color:rgba(255,45,45,.6);
      box-shadow:0 0 0 3px rgba(255,45,45,.15);
    }
    button{
      width:100%;
      margin-top:10px;
      padding:12px 14px;
      font-size:16px;
      font-weight:900;
      border-radius:14px;
      border:1px solid rgba(255,45,45,.55);
      background:linear-gradient(180deg, rgba(255,45,45,.95), rgba(176,0,0,.95));
      color:#fff;
      cursor:pointer;
    }
    button:active{transform:translateY(1px);}
    .msg{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
      min-height:18px;
    }
    .summary{
      display:none;
      margin-top:12px;
      padding:14px;
      border-radius:16px;
      border:1px dashed rgba(255,45,45,.35);
      background:rgba(255,45,45,.06);
    }
    .seat{
      font-size:48px;
      font-weight:1000;
      color:var(--red);
      text-shadow:0 0 18px rgba(255,45,45,.35);
      text-align:center;
      letter-spacing:.5px;
    }
    .sub{
      margin-top:6px;
      text-align:center;
      font-size:13px;
      color:var(--muted);
      white-space:pre-line;
      line-height:1.55;
    }
    .block{
      margin-top:14px;
      padding:14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      display:none;
    }
    .blockTitle{
      font-weight:900;
      margin-bottom:10px;
      font-size:15px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:8px;
    }
    th,td{
      border-bottom:1px solid rgba(255,255,255,.08);
      padding:10px 8px;
      text-align:left;
      font-size:14px;
      vertical-align:top;
    }
    th{color:var(--muted)}
    tr:last-child td{border-bottom:none}
    .ok{color:var(--green); font-weight:800}
    .mid{color:var(--yellow); font-weight:800}
    .no{color:var(--redSoft); font-weight:800}
    .bestRow{
      background:rgba(46, 204, 113, .08);
    }
    .secondRow{
      background:rgba(77, 163, 255, .08);
    }
    .candidateGrid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }
    @media (max-width: 640px){
      .candidateGrid{grid-template-columns:1fr;}
    }
    .candidateCard{
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px;
      background:rgba(0,0,0,.18);
    }
    .candidateCard.best{
      border-color:rgba(46, 204, 113, .45);
      background:rgba(46, 204, 113, .08);
    }
    .candidateCard.second{
      border-color:rgba(77, 163, 255, .45);
      background:rgba(77, 163, 255, .08);
    }
    .candidateTop{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
    }
    .candidateSeat{
      font-size:22px;
      font-weight:900;
    }
    .badge{
      display:inline-block;
      padding:2px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
    }
    .badge.best{background:rgba(46, 204, 113, .18); color:var(--green)}
    .badge.second{background:rgba(77, 163, 255, .18); color:var(--blue)}
    .badge.mid{background:rgba(241, 196, 15, .18); color:var(--yellow)}
    .badge.no{background:rgba(255, 140, 140, .15); color:var(--redSoft)}
    .candidateCond{
      font-size:13px;
      color:var(--muted);
      line-height:1.6;
    }
    .tiny{
      margin-top:12px;
      font-size:12px;
      color:rgba(255,255,255,.5);
      line-height:1.7;
      white-space:pre-line;
    }
    code{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }
    .history{
      margin-top:14px;
      padding:14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
    }
    .historyHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .historyTitle{
      font-weight:900;
      font-size:15px;
    }
    .smallBtn{
      width:auto;
      margin-top:0;
      padding:8px 10px;
      font-size:12px;
      border-radius:10px;
    }
    .historyList{
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:260px;
      overflow:auto;
    }
    .historyItem{
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:10px;
      background:rgba(0,0,0,.18);
    }
    .historyTop{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }
    .historyMain{
      font-size:14px;
      line-height:1.6;
    }
    .pill{
      display:inline-block;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      font-weight:800;
      margin-right:6px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">八戒X值智能匹配</div>

    <div class="panel">
      <input id="room" inputmode="numeric" placeholder="输入5位房号（例如：74759）" maxlength="5" />
      <button id="go">开干</button>

      <div class="msg" id="msg"></div>

      <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 14px;">
        <div class="summary" id="summary-bajie" style="display:none;">
          <div style="font-size:14px; color:var(--muted); margin-bottom:8px; font-weight:800;">八戒别跑</div>
          <div class="seat" id="finalSeat-bajie">—</div>
          <div class="sub" id="finalSub-bajie">—</div>
        </div>

        <div class="summary" id="summary-liulang" style="display:none;">
          <div style="font-size:14px; color:var(--muted); margin-bottom:8px; font-weight:800;">流浪小男孩</div>
          <div class="seat" id="finalSeat-liulang">—</div>
          <div class="sub" id="finalSub-liulang">—</div>
        </div>
      </div>

      <div class="block" id="candidateBlock" style="display:none;">
        <div class="blockTitle">候选位总览</div>
        <div class="candidateGrid" id="candidateGrid"></div>
      </div>

      <div class="block" id="detailBlock" style="display:none;">
        <div class="blockTitle">逐位详细判断</div>
        <table>
          <thead>
            <tr>
              <th>位子</th>
              <th>X值需求</th>
              <th>当前X值</th>
              <th>是否匹配</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="tiny">
【八戒别跑】
X值配置：2号[2,4] | 3号[8,7] | 4号[4,5,8] | 5号[3,9] | 6号[9,6,1]
综合评分：6号 > 5号 > 3号 > 4号 > 2号

【流浪小男孩】
X值配置：2号[4] | 3号[2] | 4号[0,5] | 5号[4,5,6] | 6号[5,2]
综合评分：6号 > 2号 > 5号 > 4号 > 3号

说明：输入房号，两个账号同时输出各自的推荐位子。
      </div>
    </div>
  </div>

  <script>
    const roomEl = document.getElementById("room");
    const goEl = document.getElementById("go");
    const msgEl = document.getElementById("msg");
    
    // 两个账号的规则配置
    const ACCOUNTS = {
      bajie: {
        name: "八戒别跑",
        xValues: {
          2: [2, 4],
          3: [8, 7],
          4: [4, 5, 8],
          5: [3, 9],
          6: [9, 6, 1]
        },
        seatPriority: {
          6: 1,
          5: 2,
          3: 3,
          4: 4,
          2: 5
        }
      },
      liulang: {
        name: "流浪小男孩",
        xValues: {
          2: [4],
          3: [2],
          4: [0, 5],
          5: [4, 5, 6],
          6: [5, 2]
        },
        seatPriority: {
          6: 1,
          2: 2,
          5: 3,
          4: 4,
          3: 5
        }
      }
    };

    function analyze(room5, accountKey) {
      const config = ACCOUNTS[accountKey];
      const X_VALUES = config.xValues;
      const SEAT_PRIORITY = config.seatPriority;

      const digits = room5.split('').map(Number);
      const [A, B, C, D, E] = digits;

      const rows = [];

      for(let seat = 2; seat <= 6; seat++){
        let xValue;
        if(seat === 6 || seat === 5){
          xValue = E;
        } else if(seat === 4){
          xValue = D;
        } else if(seat === 3){
          xValue = C;
        } else if(seat === 2){
          xValue = B;
        }

        const requiredXValues = X_VALUES[seat];
        const isHit = requiredXValues.includes(xValue);

        rows.push({
          seat,
          xValue,
          requiredXValues: requiredXValues.join(", "),
          isHit,
          cls: isHit ? "ok" : "no",
          priority: SEAT_PRIORITY[seat]
        });
      }

      const hits = rows
        .filter(r => r.isHit)
        .sort((a, b) => a.priority - b.priority)
        .slice(0, 3);

      let finalSeat = "跳";
      let finalDesc = "无";

      if (hits.length > 0) {
        finalSeat = `${hits[0].seat}号`;
        finalDesc = `X=${hits[0].xValue}`;

        if (hits.length > 1) {
          const others = hits.slice(1).map(x => `${x.seat}号`).join("、");
          finalDesc += `\n次选：${others}`;
        }
      }

      return { finalSeat, finalDesc };
    }

    function run(){
      const s = roomEl.value.trim().replace(/\s+/g, "");
      if(!/^\d{5}$/.test(s)){
        msgEl.textContent = "请输入正确的5位数字";
        document.getElementById("summary-bajie").style.display = "none";
        document.getElementById("summary-liulang").style.display = "none";
        return;
      }

      msgEl.textContent = "";

      // 八戒别跑的结果
      const bajiResult = analyze(s, "bajie");
      const summaryBajie = document.getElementById("summary-bajie");
      document.getElementById("finalSeat-bajie").textContent = bajiResult.finalSeat;
      document.getElementById("finalSub-bajie").textContent = bajiResult.finalDesc;
      summaryBajie.style.display = "block";

      // 流浪小男孩的结果
      const liulangResult = analyze(s, "liulang");
      const summaryLiulang = document.getElementById("summary-liulang");
      document.getElementById("finalSeat-liulang").textContent = liulangResult.finalSeat;
      document.getElementById("finalSub-liulang").textContent = liulangResult.finalDesc;
      summaryLiulang.style.display = "block";

      setTimeout(() => {
        roomEl.value = "";
        roomEl.focus();
      }, 250);
    }

    goEl.addEventListener("click", run);
    roomEl.addEventListener("keydown", e => {
      if(e.key === "Enter") run();
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }

    roomEl.focus();
  </script>
</body>
</html>
