  <title>三账号智能模型 v4.0 - 梦见新逻辑</title>
  <style>
    :root{
      --bg:#0b0b0f;
      --card:#11111a;
      --line:rgba(255,255,255,.10);
      --text:#f5f5f7;
      --muted:rgba(255,255,255,.65);
      --red:#ff2d2d;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(800px 400px at 50% 20%, rgba(255,45,45,.18), transparent 60%),
        radial-gradient(900px 500px at 50% 120%, rgba(176,0,0,.22), transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      padding:18px;
    }
    .app{width:min(820px,100%)}
    .title{
      font-size:24px;
      font-weight:900;
      margin:0 0 12px;
      display:flex;
      align-items:center;
      gap:10px;
      letter-spacing:.3px;
    }
    .title::before{
      content:"";
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--red);
      box-shadow:0 0 18px rgba(255,45,45,.8);
    }
    .panel{
      background:linear-gradient(180deg, rgba(255,45,45,.08), transparent 50%), var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      box-shadow:0 18px 60px rgba(0,0,0,.55);
    }
    input{
      width:100%;
      padding:14px 14px;
      font-size:20px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.35);
      color:var(--text);
      outline:none;
    }
    input:focus{
      border-color:rgba(255,45,45,.6);
      box-shadow:0 0 0 3px rgba(255,45,45,.15);
    }
    button{
      width:100%;
      margin-top:10px;
      padding:12px 14px;
      font-size:16px;
      font-weight:900;
      border-radius:14px;
      border:1px solid rgba(255,45,45,.55);
      background:linear-gradient(180deg, rgba(255,45,45,.95), rgba(176,0,0,.95));
      color:#fff;
      cursor:pointer;
    }
    button:active{transform:translateY(1px);}
    .msg{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
      min-height:18px;
    }
    .summary{
      display:none;
      margin-top:12px;
      padding:14px;
      border-radius:16px;
      border:1px dashed rgba(255,45,45,.35);
      background:rgba(255,45,45,.06);
    }
    .seat{
      font-size:48px;
      font-weight:1000;
      color:var(--red);
      text-shadow:0 0 18px rgba(255,45,45,.35);
      text-align:center;
      letter-spacing:.5px;
    }
    .sub{
      margin-top:6px;
      text-align:center;
      font-size:13px;
      color:var(--muted);
      white-space:pre-line;
      line-height:1.55;
    }
    .history{
      margin-top:14px;
      padding:14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
    }
    .historyHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .historyTitle{
      font-weight:900;
      font-size:15px;
    }
    .smallBtn{
      width:auto;
      margin-top:0;
      padding:8px 10px;
      font-size:12px;
      border-radius:10px;
      border:1px solid rgba(255,45,45,.55);
      background:linear-gradient(180deg, rgba(255,45,45,.95), rgba(176,0,0,.95));
      color:#fff;
      cursor:pointer;
    }
    .historyList{
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:260px;
      overflow:auto;
    }
    .historyItem{
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:10px;
      background:rgba(0,0,0,.18);
    }
    .historyTop{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }
    .historyMain{
      font-size:14px;
      line-height:1.6;
    }
    .pill{
      display:inline-block;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      font-weight:800;
      margin-right:6px;
    }
    .tiny{
      margin-top:12px;
      font-size:12px;
      color:rgba(255,255,255,.5);
      line-height:1.7;
      white-space:pre-line;
    }
    .grid{
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }
  </style>
</head>

【八戒别跑】M=(98636-房号)/X值 v3.0
5号位最强 > 1号位 > 6号位 > 2号位 > 4号位 > 3号位

【流浪小男孩】
6号最优 > 4号 > 2号 > 3号 > 5号

【梦见】M=(5096507-房号)/X值 v4.0 ⭐新逻辑
4号最优(¥970/局) > 5号(¥720/局) > 6号(¥640/局)
X=1优先 | X=3禁 | X=5/7可玩
禁止：5号+X=5 | 奇数M

  <script>
    const roomEl = document.getElementById("room");
    const goEl = document.getElementById("go");
    const msgEl = document.getElementById("msg");
    const historyListEl = document.getElementById("historyList");
    const clearHistoryEl = document.getElementById("clearHistory");

    const HISTORY_KEY = "mengjian_history";
    const HISTORY_LIMIT = 30;

    // 梦见新逻辑分析
    function analyzeMengjian(room5) {
      const digits = room5.split('').map(Number);
      const [A, B, C, D, E] = digits;
      const seatMapping = { 1: A, 2: B, 3: C, 4: D, 5: E, 6: E };

      const ID = 5096507;
      const roomNum = parseInt(room5);
      const results = [];

      // 遍历所有座位
      for(let seat = 1; seat <= 6; seat++) {
        const xValue = seatMapping[seat];
        const mValue = Math.floor((ID - roomNum) / xValue);
        const mIsEven = (mValue % 2 === 0);

        // 第1关：M值必须是偶数
        if (!mIsEven) continue;

        // 第3关：禁止5号+X=5
        if (seat === 5 && xValue === 5) continue;

        // 第2关：禁止X=3
        if (xValue === 3) continue;

        const seatPriority = [999, 6, 4, 5, 1, 2, 3]; // 座位优先级
        results.push({
          seat,
          xValue,
          mValue,
          priority: seatPriority[seat]
        });
      }

      // 排序并取前3个
      const hits = results.sort((a, b) => a.priority - b.priority).slice(0, 3);

      let finalSeat = "跳";
      let finalDesc = "无";

      if (hits.length > 0) {
        finalSeat = `${hits[0].seat}号`;
        finalDesc = `X=${hits[0].xValue}`;

        if (hits.length > 1) {
          const others = hits.slice(1).map(x => `${x.seat}号`).join("、");
          finalDesc += `\n次选：${others}`;
        }
      }

      return { finalSeat, finalDesc, seats: hits.map(h => h.seat) };
    }

    // 八戒分析
    function analyzeBajie(room5) {
      const digits = room5.split('').map(Number);
      const [A, B, C, D, E] = digits;
      const seatMapping = { 1: A, 2: B, 3: C, 4: D, 5: E, 6: E };

      const xValues = {
        1: [0, 7, 2],
        2: [0, 2, 5],
        3: [8, 7, 6],
        4: [3, 2, 1],
        5: [9, 8, 1],
        6: [1, 8, 9]
      };

      const priority = { 5: 1, 1: 2, 6: 3, 2: 4, 4: 5, 3: 6 };

      const results = [];
      for(let seat = 1; seat <= 6; seat++) {
        const xValue = seatMapping[seat];
        if (xValues[seat].includes(xValue)) {
          results.push({ seat, xValue, priority: priority[seat] });
        }
      }

      const hits = results.sort((a, b) => a.priority - b.priority).slice(0, 3);
      let finalSeat = "跳";
      let finalDesc = "无";

      if (hits.length > 0) {
        finalSeat = `${hits[0].seat}号`;
        finalDesc = `X=${hits[0].xValue}`;
        if (hits.length > 1) {
          const others = hits.slice(1).map(x => `${x.seat}号`).join("、");
          finalDesc += `\n次选：${others}`;
        }
      }

      return { finalSeat, finalDesc, seats: hits.map(h => h.seat) };
    }

    // 流浪分析
    function analyzeLiulang(room5) {
      const digits = room5.split('').map(Number);
      const [A, B, C, D, E] = digits;
      const seatMapping = { 1: A, 2: B, 3: C, 4: D, 5: E, 6: E };

      const xValues = {
        2: [2, 4],
        3: [2],
        4: [0, 5],
        5: [5, 6],
        6: [5]
      };

      const priority = { 6: 1, 4: 2, 2: 3, 3: 4, 5: 5 };

      const results = [];
      for(let seat in xValues) {
        seat = parseInt(seat);
        const xValue = seatMapping[seat];
        if (xValues[seat].includes(xValue)) {
          results.push({ seat, xValue, priority: priority[seat] });
        }
      }

      const hits = results.sort((a, b) => a.priority - b.priority).slice(0, 3);
      let finalSeat = "跳";
      let finalDesc = "无";

      if (hits.length > 0) {
        finalSeat = `${hits[0].seat}号`;
        finalDesc = `X=${hits[0].xValue}`;
        if (hits.length > 1) {
          const others = hits.slice(1).map(x => `${x.seat}号`).join("、");
          finalDesc += `\n次选：${others}`;
        }
      }

      return { finalSeat, finalDesc, seats: hits.map(h => h.seat) };
    }

    function loadHistory(){
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveHistory(items){
      localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, HISTORY_LIMIT)));
    }

    function renderHistory(){
      const items = loadHistory();
      historyListEl.innerHTML = "";

      if(items.length === 0){
        historyListEl.innerHTML = `<div class="historyItem"><div class="historyMain" style="color:rgba(255,255,255,.55)">暂无记录</div></div>`;
        return;
      }

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "historyItem";
        const resultText = item.accounts
          .map(acc => `${acc.name}:${acc.seats.length > 0 ? acc.seats.join("、") + "号" : "跳"}`).join(" | ");

        div.innerHTML = `
          <div class="historyTop">
            <div>房号：<span class="pill">${item.room}</span></div>
            <div>${item.time}</div>
          </div>
          <div class="historyMain">${resultText}</div>
        `;
        historyListEl.appendChild(div);
      });
    }

    function pushHistory(room, results) {
      const items = loadHistory();
      items.unshift({
        room,
        accounts: [
          { name: "八戒别跑", seats: results.bajie.seats },
          { name: "流浪小男孩", seats: results.liulang.seats },
          { name: "梦见", seats: results.mengjian.seats }
        ],
        time: new Date().toLocaleString("zh-CN", { hour12:false })
      });
      saveHistory(items);
      renderHistory();
    }

    function run(){
      const s = roomEl.value.trim();
      if(!/^\d{5}$/.test(s)){
        msgEl.textContent = "请输入正确的5位数字";
        document.getElementById("summary-bajie").style.display = "none";
        document.getElementById("summary-liulang").style.display = "none";
        document.getElementById("summary-mengjian").style.display = "none";
        return;
      }

      msgEl.textContent = "";

      const results = {
        bajie: analyzeBajie(s),
        liulang: analyzeLiulang(s),
        mengjian: analyzeMengjian(s)
      };

      document.getElementById("finalSeat-bajie").textContent = results.bajie.finalSeat;
      document.getElementById("finalSub-bajie").textContent = results.bajie.finalDesc;
      document.getElementById("summary-bajie").style.display = "block";

      document.getElementById("finalSeat-liulang").textContent = results.liulang.finalSeat;
      document.getElementById("finalSub-liulang").textContent = results.liulang.finalDesc;
      document.getElementById("summary-liulang").style.display = "block";

      document.getElementById("finalSeat-mengjian").textContent = results.mengjian.finalSeat;
      document.getElementById("finalSub-mengjian").textContent = results.mengjian.finalDesc;
      document.getElementById("summary-mengjian").style.display = "block";

      pushHistory(s, results);

      setTimeout(() => {
        roomEl.value = "";
        roomEl.focus();
      }, 250);
    }

    goEl.addEventListener("click", run);
    roomEl.addEventListener("keydown", e => {
      if(e.key === "Enter") run();
    });

    clearHistoryEl.addEventListener("click", () => {
      localStorage.removeItem(HISTORY_KEY);
      renderHistory();
    });

    renderHistory();
    roomEl.focus();
  </script>

</body>
