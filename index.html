<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#b00000"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="72050专属结构模型">
  <title>72050专属结构模型</title>
  <style>
    :root{
      --bg:#0b0b0f;--card:#11111a;--line:rgba(255,255,255,.10);
      --text:#f5f5f7;--muted:rgba(255,255,255,.50);--red:#ff2d2d;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:
        radial-gradient(800px 400px at 50% 15%,rgba(255,45,45,.20),transparent 60%),
        radial-gradient(900px 500px at 50% 110%,rgba(176,0,0,.25),transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
      padding:18px;
    }
    .app{width:min(500px,100%);}

    .title{
      font-size:18px;font-weight:900;margin:0 0 14px;
      display:flex;align-items:center;gap:9px;
    }
    .title::before{
      content:"";flex-shrink:0;width:9px;height:9px;border-radius:50%;
      background:var(--red);box-shadow:0 0 14px rgba(255,45,45,.9);
    }
    .version{font-size:11px;color:rgba(255,45,45,.6);margin-left:4px;font-weight:400;}

    .panel{
      background:linear-gradient(160deg,rgba(255,45,45,.07),transparent 55%),var(--card);
      border:1px solid var(--line);border-radius:20px;padding:18px;
      box-shadow:0 20px 70px rgba(0,0,0,.60);
    }

    input{
      width:100%;padding:14px 16px;font-size:26px;letter-spacing:6px;
      border-radius:14px;border:1px solid var(--line);
      background:rgba(0,0,0,.40);color:var(--text);outline:none;
      text-align:center;font-weight:700;
    }
    input:focus{border-color:rgba(255,45,45,.65);box-shadow:0 0 0 3px rgba(255,45,45,.12);}
    input::placeholder{font-size:15px;letter-spacing:1px;font-weight:400;}

    .btn-wrap{display:flex;justify-content:center;margin:16px 0 8px;}
    .btn-circle{
      width:76px;height:76px;border-radius:50%;
      border:2px solid rgba(255,45,45,.55);
      background:radial-gradient(circle at 38% 32%,rgba(255,90,90,.95),rgba(155,0,0,.95));
      color:#fff;font-size:17px;font-weight:900;letter-spacing:1px;
      cursor:pointer;display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 22px rgba(255,45,45,.40),inset 0 1px 0 rgba(255,255,255,.18);
      transition:transform .1s,box-shadow .1s;
    }
    .btn-circle:active{transform:scale(.92);}

    .msg{text-align:center;font-size:12px;color:var(--muted);min-height:14px;margin-bottom:8px;}

    .result{display:none;margin-top:4px;}
    .result-hdr{
      text-align:center;font-size:11px;color:var(--muted);
      margin-bottom:10px;letter-spacing:.5px;
    }
    .hit-list{display:flex;flex-direction:column;gap:7px;}

    .hit{
      display:grid;grid-template-columns:auto 78px 1fr auto;
      align-items:center;gap:10px;
      padding:10px 13px;border-radius:13px;
      border:1px solid rgba(255,255,255,.07);
      background:rgba(0,0,0,.22);
    }
    .hit.r1{border-color:rgba(255,45,45,.50);background:rgba(255,45,45,.10);}
    .hit.r2{border-color:rgba(255,140,0,.28);}
    .hit.r3{border-color:rgba(255,255,255,.10);}

    .hit-lbl{
      font-size:10px;font-weight:900;padding:3px 7px;border-radius:999px;
      background:rgba(255,45,45,.20);color:#ff8080;
      white-space:nowrap;letter-spacing:.3px;
    }
    .hit.r1 .hit-lbl{background:rgba(255,45,45,.38);color:#ff9090;}

    .hit-seat{
      font-size:28px;font-weight:1000;color:var(--red);
      text-shadow:0 0 16px rgba(255,45,45,.45);
      line-height:1.1;text-align:center;
      white-space:nowrap;
    }
    .hit-body{line-height:1.7;}
    .hit-body .row1{font-size:12px;color:var(--text);}
    .hit-body .row2{font-size:11px;color:var(--muted);}
    .hit-body .row3{font-size:10px;color:rgba(255,255,255,.30);margin-top:1px;}

    .hit-right{text-align:right;}
    .hit-wr{font-size:13px;font-weight:900;color:rgba(80,255,140,.85);}
    .hit-avg{font-size:10px;color:rgba(255,255,255,.35);margin-top:2px;}

    .skip{
      display:none;text-align:center;padding:22px;
      font-size:38px;font-weight:1000;color:rgba(255,255,255,.18);
      letter-spacing:4px;
    }

    .history{
      margin-top:13px;padding:11px 13px;border-radius:13px;
      border:1px solid var(--line);background:rgba(255,255,255,.02);
    }
    .histHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
    .histTitle{font-size:12px;font-weight:800;color:var(--muted);}
    .clearBtn{
      font-size:11px;padding:4px 9px;border-radius:7px;cursor:pointer;
      border:1px solid rgba(255,45,45,.35);background:rgba(255,45,45,.10);
      color:rgba(255,100,100,.85);
    }
    .histList{display:flex;flex-direction:column;gap:5px;max-height:200px;overflow:auto;}
    .histItem{
      border:1px solid rgba(255,255,255,.05);border-radius:9px;
      padding:7px 10px;background:rgba(0,0,0,.14);
    }
    .histTop{display:flex;justify-content:space-between;font-size:10px;color:rgba(255,255,255,.35);margin-bottom:2px;}
    .histMain{font-size:12px;color:rgba(255,255,255,.60);}
    .pill{
      display:inline-block;padding:1px 6px;border-radius:999px;
      border:1px solid rgba(255,45,45,.35);background:rgba(255,45,45,.10);
      font-weight:800;color:var(--red);margin-right:3px;
    }

    .tiny{
      margin-top:13px;padding-top:11px;border-top:1px solid var(--line);
      font-size:11px;color:rgba(255,255,255,.28);line-height:1.8;white-space:pre-line;
    }
  </style>
</head>
<body>
<div class="app">
  <div class="title">72050专属<span class="version">结构 / 强X双模型</span></div>
  <div class="panel">

    <input id="room" inputmode="numeric" placeholder="输入5位房号" maxlength="5"/>

    <div class="btn-wrap">
      <button class="btn-circle" id="go">开干</button>
    </div>

    <div class="msg" id="msg"></div>

    <div class="result" id="result">
      <div class="result-hdr" id="resultHdr">— 72050双模型结果 —</div>
      <div class="hit-list" id="hitList"></div>
    </div>
    <div class="skip" id="skip">跳</div>

    <div class="history">
      <div class="histHead">
        <span class="histTitle">最近记录</span>
        <button class="clearBtn" id="clearBtn">清空</button>
      </div>
      <div class="histList" id="histList"></div>
    </div>

    <div class="tiny">
【72050专属结构模型】

当前模型：
- 13种结构
- 15条位子规则
- 叠加72050专属强X

72050专属强X：
2号：4、8
3号：2、6、7、8
4号：0、2、4、5、6、7
5号：0、1、3、7、9
6号：1、2

说明：
- 先看72050结构模型
- 再看72050专属强X
- 每个模型最多给 2 个位子
    </div>

  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
// 72050专属：13结构 / 15规则
// 每个结构最多给2个位子
// ══════════════════════════════════════════════════════
const STRUCT_RULES_72050 = {
  '奇偶奇偶奇': [
    { seat: 5, tag: '强结构', n: 2, net: 2680, wr: '100%', avg: '+1340' }
  ],
  '偶偶奇偶奇': [
    { seat: 5, tag: '强结构', n: 2, net: 2230, wr: '100%', avg: '+1115' }
  ],
  '偶奇奇偶奇': [
    { seat: 4, tag: '强结构', n: 2, net: 1400, wr: '100%', avg: '+700' }
  ],
  '偶奇偶奇偶': [
    { seat: 6, tag: '强结构', n: 2, net: 160, wr: '100%', avg: '+80' }
  ],
  '奇偶偶偶奇': [
    { seat: 5, tag: '扩容结构', n: 3, net: 1700, wr: '100%', avg: '+566' }
  ],
  '奇偶奇奇偶': [
    { seat: 6, tag: '扩容结构', n: 2, net: 1050, wr: '100%', avg: '+525' }
  ],
  '奇偶奇偶偶': [
    { seat: 5, tag: '扩容结构', n: 2, net: 670, wr: '50%', avg: '+335' }
  ],
  '奇偶偶奇奇': [
    { seat: 6, tag: '扩容结构', n: 1, net: 1350, wr: '100%', avg: '+1350' },
    { seat: 4, tag: '扩容结构', n: 2, net: 630, wr: '100%', avg: '+315' }
  ],
  '奇奇奇奇奇': [
    { seat: 5, tag: '扩容结构', n: 2, net: 1380, wr: '100%', avg: '+690' }
  ],
  '奇奇偶奇奇': [
    { seat: 3, tag: '扩容结构', n: 2, net: 720, wr: '50%', avg: '+360' }
  ],
  '奇偶偶奇偶': [
    { seat: 5, tag: '后补扩容', n: 1, net: 1060, wr: '100%', avg: '+1060' }
  ],
  '偶偶奇偶偶': [
    { seat: 5, tag: '后补扩容', n: 1, net: 990, wr: '100%', avg: '+990' }
  ],
  '偶奇奇偶偶': [
    { seat: 6, tag: '后补扩容', n: 1, net: 990, wr: '100%', avg: '+990' }
  ],
  '奇偶偶奇奇_2号补充': [
    { seat: 2, tag: '后补扩容', n: 1, net: 2310, wr: '100%', avg: '+2310' }
  ]
};

// 72050专属强X
const STRONG_X_72050 = {
  2: new Set([4, 8]),
  3: new Set([2, 6, 7, 8]),
  4: new Set([0, 2, 4, 5, 6, 7]),
  5: new Set([0, 1, 3, 7, 9]),
  6: new Set([1, 2]),
};

const HISTORY_KEY   = 'model_72050_struct_x_v1';
const HISTORY_LIMIT = 30;

const roomEl     = document.getElementById('room');
const goEl       = document.getElementById('go');
const msgEl      = document.getElementById('msg');
const resultEl   = document.getElementById('result');
const resultHdr  = document.getElementById('resultHdr');
const hitListEl  = document.getElementById('hitList');
const skipEl     = document.getElementById('skip');
const histListEl = document.getElementById('histList');
const clearBtnEl = document.getElementById('clearBtn');

function getParityPattern(room){
  return room
    .split('')
    .map(n => (parseInt(n, 10) % 2 === 0 ? '偶' : '奇'))
    .join('');
}

function getSeatX(room, seat){
  const digits = room.split('').map(Number);
  return seat >= 5 ? digits[4] : digits[seat - 1];
}

// 处理奇偶偶奇奇的2号补充结构
function getRulesForPattern(pattern){
  const rules = STRUCT_RULES_72050[pattern] || [];
  if(pattern === '奇偶偶奇奇'){
    return [
      ...rules,
      ...(STRUCT_RULES_72050['奇偶偶奇奇_2号补充'] || [])
    ];
  }
  return rules;
}

// 72050结构模型
function getStructureModel(room5){
  const pattern = getParityPattern(room5);
  const rules = getRulesForPattern(pattern);

  if(!rules || !rules.length){
    return { ok: false, pattern, reason: '无72050结构命中' };
  }

  const hits = rules.slice(0, 2).map(rule => ({
    seat: rule.seat,
    X: getSeatX(room5, rule.seat),
    tag: rule.tag,
    n: rule.n,
    net: rule.net,
    wr: rule.wr,
    avg: rule.avg,
  }));

  return { ok: true, pattern, hits };
}

// 72050结构 + 强X
function getStructureStrongXModel(room5){
  const base = getStructureModel(room5);

  if(!base.ok){
    return { ok: false, pattern: base.pattern, reason: base.reason };
  }

  const passed = base.hits.filter(hit => STRONG_X_72050[hit.seat] && STRONG_X_72050[hit.seat].has(hit.X));

  if(!passed.length){
    return {
      ok: false,
      pattern: base.pattern,
      reason: '结构命中，但72050强X未命中',
      original: base
    };
  }

  return {
    ok: true,
    pattern: base.pattern,
    hits: passed.slice(0, 2)
  };
}

function formatSeats(hits){
  return hits.map(h => `${h.seat}`).join(' / ');
}
function formatXs(hits){
  return hits.map(h => `${h.X}`).join(' / ');
}
function formatTags(hits){
  return hits.map(h => h.tag).join('；');
}
function formatStats(hits){
  return hits.map(h => `${h.seat}号(${h.n}局 ${h.net >= 0 ? '+' + h.net : h.net})`).join('；');
}
function formatWrAvg(hits){
  if (!hits.length) return { wr: '—', avg: '—' };
  if (hits.length === 1) return { wr: hits[0].wr, avg: hits[0].avg };
  return { wr: `${hits[0].wr} / ${hits[1].wr}`, avg: `${hits[0].avg} / ${hits[1].avg}` };
}

function buildModelCard({label, seatsText, pattern, xText, note, wr, avg}, rank=1){
  const cls = rank <= 3 ? `r${rank}` : '';
  const div = document.createElement('div');
  div.className = `hit ${cls}`;
  div.innerHTML = `
    <div class="hit-lbl">${label}</div>
    <div class="hit-seat">${seatsText}</div>
    <div class="hit-body">
      <div class="row1">结构=${pattern}</div>
      <div class="row2">位子=${seatsText}　X=${xText}</div>
      <div class="row3">${note}</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">${wr}</div>
      <div class="hit-avg">${avg}</div>
    </div>
  `;
  return div;
}

function buildSkipCard({label, pattern, note}, rank=2){
  const cls = rank <= 3 ? `r${rank}` : '';
  const div = document.createElement('div');
  div.className = `hit ${cls}`;
  div.innerHTML = `
    <div class="hit-lbl">${label}</div>
    <div class="hit-seat" style="color:rgba(255,255,255,.25);text-shadow:none;">跳</div>
    <div class="hit-body">
      <div class="row1">结构=${pattern}</div>
      <div class="row2">${note}</div>
      <div class="row3">该模型当前无可用位子</div>
    </div>
    <div class="hit-right">
      <div class="hit-wr">—</div>
      <div class="hit-avg">—</div>
    </div>
  `;
  return div;
}

function render(room5){
  const structRes = getStructureModel(room5);
  const strongRes = getStructureStrongXModel(room5);

  resultEl.style.display = 'none';
  skipEl.style.display   = 'none';
  hitListEl.innerHTML    = '';

  if(!structRes.ok){
    resultHdr.textContent = `${structRes.pattern}　无72050结构命中`;
    skipEl.style.display = 'block';
    return [];
  }

  resultEl.style.display = 'block';
  resultHdr.textContent = `${structRes.pattern}　72050双模型结果`;

  const structStat = formatWrAvg(structRes.hits);
  hitListEl.appendChild(
    buildModelCard({
      label: '72050结构模型',
      seatsText: formatSeats(structRes.hits),
      pattern: structRes.pattern,
      xText: formatXs(structRes.hits),
      note: `备注：13结构 / 15规则；类型=${formatTags(structRes.hits)}；${formatStats(structRes.hits)}`,
      wr: structStat.wr,
      avg: structStat.avg
    }, 1)
  );

  if(strongRes.ok){
    const strongStat = formatWrAvg(strongRes.hits);
    hitListEl.appendChild(
      buildModelCard({
        label: '72050结构+强X',
        seatsText: formatSeats(strongRes.hits),
        pattern: strongRes.pattern,
        xText: formatXs(strongRes.hits),
        note: `备注：在72050结构命中的基础上，再命中72050专属强X；${formatStats(strongRes.hits)}`,
        wr: strongStat.wr,
        avg: strongStat.avg
      }, 2)
    );
  } else {
    hitListEl.appendChild(
      buildSkipCard({
        label: '72050结构+强X',
        pattern: structRes.pattern,
        note: '备注：72050结构已命中，但当前X未命中72050专属强X'
      }, 2)
    );
  }

  return strongRes.ok ? strongRes.hits.map(h => h.seat) : structRes.hits.map(h => h.seat);
}

function run(){
  const raw = roomEl.value.trim().replace(/\s+/g, '');
  if(!/^\d{5}$/.test(raw)){
    msgEl.textContent = '请输入正确的5位数字';
    return;
  }
  msgEl.textContent = '';
  const seats = render(raw);
  pushHistory(raw, seats);
  setTimeout(() => { roomEl.value = ''; roomEl.focus(); }, 180);
}

function loadHist(){
  try{
    return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
  }catch{
    return [];
  }
}
function saveHist(items){
  localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, HISTORY_LIMIT)));
}

function renderHist(){
  const items = loadHist();
  histListEl.innerHTML = '';
  if(!items.length){
    histListEl.innerHTML = `<div class="histItem"><div class="histMain" style="color:rgba(255,255,255,.2)">暂无记录</div></div>`;
    return;
  }
  items.forEach(item => {
    const div = document.createElement('div');
    div.className = 'histItem';
    const res = item.seats.length ? item.seats.map(s=>`${s}号`).join(' / ') : '跳';
    div.innerHTML = `
      <div class="histTop"><span>房号 <span class="pill">${item.room}</span></span><span>${item.time}</span></div>
      <div class="histMain">${item.pattern}　→　${res}</div>`;
    histListEl.appendChild(div);
  });
}

function pushHistory(room, seats){
  const items = loadHist();
  items.unshift({
    room,
    seats,
    pattern: getParityPattern(room),
    time: new Date().toLocaleString('zh-CN', {hour12:false})
  });
  saveHist(items);
  renderHist();
}

goEl.addEventListener('click', run);
roomEl.addEventListener('keydown', e => { if(e.key === 'Enter') run(); });
clearBtnEl.addEventListener('click', () => {
  localStorage.removeItem(HISTORY_KEY);
  renderHist();
});

if('serviceWorker' in navigator){
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
}

renderHist();
roomEl.focus();
</script>
</body>
</html>
