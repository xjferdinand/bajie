<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#b00000" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="八戒X值匹配">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>八戒X值智能匹配</title>

  <style>
    :root{
      --bg:#0b0b0f;
      --card:#11111a;
      --line:rgba(255,255,255,.10);
      --text:#f5f5f7;
      --muted:rgba(255,255,255,.65);
      --red:#ff2d2d;
      --green:#2ecc71;
      --yellow:#f1c40f;
      --blue:#4da3ff;
      --redSoft:#ff8c8c;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(800px 400px at 50% 20%, rgba(255,45,45,.18), transparent 60%),
        radial-gradient(900px 500px at 50% 120%, rgba(176,0,0,.22), transparent 60%),
        var(--bg);
      color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Microsoft YaHei",sans-serif;
      padding:18px;
    }
    .app{width:min(820px,100%)}
    .title{
      font-size:24px;
      font-weight:900;
      margin:0 0 12px;
      display:flex;
      align-items:center;
      gap:10px;
      letter-spacing:.3px;
    }
    .title::before{
      content:"";
      width:10px;
      height:10px;
      border-radius:50%;
      background:var(--red);
      box-shadow:0 0 18px rgba(255,45,45,.8);
    }
    .panel{
      background:linear-gradient(180deg, rgba(255,45,45,.08), transparent 50%), var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      box-shadow:0 18px 60px rgba(0,0,0,.55);
    }
    input{
      width:100%;
      padding:14px 14px;
      font-size:20px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.35);
      color:var(--text);
      outline:none;
    }
    input:focus{
      border-color:rgba(255,45,45,.6);
      box-shadow:0 0 0 3px rgba(255,45,45,.15);
    }
    button{
      width:100%;
      margin-top:10px;
      padding:12px 14px;
      font-size:16px;
      font-weight:900;
      border-radius:14px;
      border:1px solid rgba(255,45,45,.55);
      background:linear-gradient(180deg, rgba(255,45,45,.95), rgba(176,0,0,.95));
      color:#fff;
      cursor:pointer;
    }
    button:active{transform:translateY(1px);}
    .msg{
      margin-top:10px;
      font-size:13px;
      color:var(--muted);
      min-height:18px;
    }
    .summary{
      display:none;
      margin-top:12px;
      padding:14px;
      border-radius:16px;
      border:1px dashed rgba(255,45,45,.35);
      background:rgba(255,45,45,.06);
    }
    .seat{
      font-size:48px;
      font-weight:1000;
      color:var(--red);
      text-shadow:0 0 18px rgba(255,45,45,.35);
      text-align:center;
      letter-spacing:.5px;
    }
    .sub{
      margin-top:6px;
      text-align:center;
      font-size:13px;
      color:var(--muted);
      white-space:pre-line;
      line-height:1.55;
    }
    .block{
      margin-top:14px;
      padding:14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      display:none;
    }
    .blockTitle{
      font-weight:900;
      margin-bottom:10px;
      font-size:15px;
    }
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:8px;
    }
    th,td{
      border-bottom:1px solid rgba(255,255,255,.08);
      padding:10px 8px;
      text-align:left;
      font-size:14px;
      vertical-align:top;
    }
    th{color:var(--muted)}
    tr:last-child td{border-bottom:none}
    .ok{color:var(--green); font-weight:800}
    .mid{color:var(--yellow); font-weight:800}
    .no{color:var(--redSoft); font-weight:800}
    .bestRow{
      background:rgba(46, 204, 113, .08);
    }
    .secondRow{
      background:rgba(77, 163, 255, .08);
    }
    .candidateGrid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
    }
    @media (max-width: 640px){
      .candidateGrid{grid-template-columns:1fr;}
    }
    .candidateCard{
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px;
      background:rgba(0,0,0,.18);
    }
    .candidateCard.best{
      border-color:rgba(46, 204, 113, .45);
      background:rgba(46, 204, 113, .08);
    }
    .candidateCard.second{
      border-color:rgba(77, 163, 255, .45);
      background:rgba(77, 163, 255, .08);
    }
    .candidateTop{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      margin-bottom:6px;
    }
    .candidateSeat{
      font-size:22px;
      font-weight:900;
    }
    .badge{
      display:inline-block;
      padding:2px 8px;
      border-radius:999px;
      font-size:12px;
      font-weight:900;
    }
    .badge.best{background:rgba(46, 204, 113, .18); color:var(--green)}
    .badge.second{background:rgba(77, 163, 255, .18); color:var(--blue)}
    .badge.mid{background:rgba(241, 196, 15, .18); color:var(--yellow)}
    .badge.no{background:rgba(255, 140, 140, .15); color:var(--redSoft)}
    .candidateCond{
      font-size:13px;
      color:var(--muted);
      line-height:1.6;
    }
    .tiny{
      margin-top:12px;
      font-size:12px;
      color:rgba(255,255,255,.5);
      line-height:1.7;
      white-space:pre-line;
    }
    code{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
    }
    .history{
      margin-top:14px;
      padding:14px;
      border-radius:16px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
    }
    .historyHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }
    .historyTitle{
      font-weight:900;
      font-size:15px;
    }
    .smallBtn{
      width:auto;
      margin-top:0;
      padding:8px 10px;
      font-size:12px;
      border-radius:10px;
    }
    .historyList{
      display:flex;
      flex-direction:column;
      gap:8px;
      max-height:260px;
      overflow:auto;
    }
    .historyItem{
      border:1px solid rgba(255,255,255,.08);
      border-radius:12px;
      padding:10px;
      background:rgba(0,0,0,.18);
    }
    .historyTop{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:13px;
      color:var(--muted);
      margin-bottom:6px;
    }
    .historyMain{
      font-size:14px;
      line-height:1.6;
    }
    .pill{
      display:inline-block;
      padding:2px 8px;
      border-radius:999px;
      border:1px solid rgba(255,45,45,.35);
      background:rgba(255,45,45,.10);
      font-weight:800;
      margin-right:6px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="title">八戒X值智能匹配</div>

    <div class="panel">
      <input id="room" inputmode="numeric" placeholder="输入5位房号（例如：74759）" maxlength="5" />
      <button id="go">开干</button>

      <div class="msg" id="msg"></div>

      <div class="summary" id="summary">
        <div class="seat" id="finalSeat">—</div>
        <div class="sub" id="finalSub">—</div>
      </div>

      <div class="block" id="candidateBlock">
        <div class="blockTitle">候选位总览</div>
        <div class="candidateGrid" id="candidateGrid"></div>
      </div>

      <div class="block" id="detailBlock">
        <div class="blockTitle">逐位详细判断</div>
        <table>
          <thead>
            <tr>
              <th>位子</th>
              <th>X值需求</th>
              <th>当前X值</th>
              <th>是否匹配</th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>

      <div class="history">
        <div class="historyHeader">
          <div class="historyTitle">最近判断记录</div>
          <button class="smallBtn" id="clearHistory">清空记录</button>
        </div>
        <div class="historyList" id="historyList"></div>
      </div>

      <div class="tiny">
位子优先级：
<code>6号 > 5号 > 3号 > 4号 > 2号</code>

X值配置：
<code>2号：2, 4</code>
<code>3号：8, 7</code>
<code>4号：4, 5, 8</code>
<code>5号：3, 9</code>
<code>6号：9, 6, 1</code>

说明：按照房号5位拆分（ABCDE），检查对应位的数字是否在X值列表中。最多输出3个位子。
      </div>
    </div>
  </div>

  <script>
    const roomEl = document.getElementById("room");
    const goEl = document.getElementById("go");
    const msgEl = document.getElementById("msg");
    const summaryEl = document.getElementById("summary");
    const finalSeatEl = document.getElementById("finalSeat");
    const finalSubEl = document.getElementById("finalSub");
    const detailBlockEl = document.getElementById("detailBlock");
    const candidateBlockEl = document.getElementById("candidateBlock");
    const tbodyEl = document.getElementById("tbody");
    const candidateGridEl = document.getElementById("candidateGrid");
    const historyListEl = document.getElementById("historyList");
    const clearHistoryEl = document.getElementById("clearHistory");

    const HISTORY_KEY = "bajie_x_match_history_v1";
    const HISTORY_LIMIT = 30;

    // X值配置
    const X_VALUES = {
      2: [2, 4],
      3: [8, 7],
      4: [4, 5, 8],
      5: [3, 9],
      6: [9, 6, 1]
    };

    // 位子优先级（1=最高）
    const SEAT_PRIORITY = {
      6: 1,
      5: 2,
      3: 3,
      4: 4,
      2: 5
    };

    // 座位号到房号位置的映射
    const SEAT_TO_POS = {
      2: 1,  // B
      3: 2,  // C
      4: 3,  // D
      5: 4,  // E
      6: 4   // E (6号和5号都对应E)
    };

    function analyze(room5){
      const digits = room5.split('').map(Number);
      const [A, B, C, D, E] = digits;

      const rows = [];

      // 逐个检查每个位子
      for(let seat = 2; seat <= 6; seat++){
        let xValue;
        if(seat === 6){
          xValue = E; // 6号对应E（第5位）
        } else if(seat === 5){
          xValue = E; // 5号对应E（第5位）
        } else if(seat === 4){
          xValue = D; // 4号对应D（第4位）
        } else if(seat === 3){
          xValue = C; // 3号对应C（第3位）
        } else if(seat === 2){
          xValue = B; // 2号对应B（第2位）
        }

        const requiredXValues = X_VALUES[seat];
        const isHit = requiredXValues.includes(xValue);

        rows.push({
          seat,
          xValue,
          requiredXValues: requiredXValues.join(", "),
          isHit,
          cls: isHit ? "ok" : "no",
          priority: SEAT_PRIORITY[seat]
        });
      }

      // 过滤匹配的位子，按优先级排序
      const hits = rows
        .filter(r => r.isHit)
        .sort((a, b) => a.priority - b.priority)
        .slice(0, 3); // 最多3个

      let finalSeat = "跳";
      let finalDesc = "当前房号不符合任何位子的X值需求";

      if (hits.length > 0) {
        finalSeat = `${hits[0].seat}号`;
        finalDesc = `最优推荐：${finalSeat}（X=${hits[0].xValue}）`;

        if (hits.length > 1) {
          const others = hits.slice(1).map(x => `${x.seat}号（X=${x.xValue}）`).join("、");
          finalDesc += `\n次选位：${others}`;
        }
      }

      return { A, B, C, D, E, rows, hits, finalSeat, finalDesc };
    }

    function renderCandidates(result){
      candidateGridEl.innerHTML = "";

      const bestSeat = result.hits[0]?.seat || null;
      const secondSeats = result.hits.slice(1).map(x => x.seat);

      result.rows.forEach(r => {
        const card = document.createElement("div");
        card.className = "candidateCard";

        let badgeHtml = `<span class="badge ${r.isHit ? "best" : "no"}">${r.isHit ? "匹配" : "不匹配"}</span>`;

        if (r.seat === bestSeat) {
          card.classList.add("best");
          badgeHtml = `<span class="badge best">最优推荐</span>`;
        } else if (secondSeats.includes(r.seat)) {
          card.classList.add("second");
          badgeHtml = `<span class="badge second">次选位</span>`;
        }

        card.innerHTML = `
          <div class="candidateTop">
            <div class="candidateSeat">${r.seat}号</div>
            <div>${badgeHtml}</div>
          </div>
          <div class="candidateCond"><strong>需要X值：</strong><code>${r.requiredXValues}</code></div>
          <div class="candidateCond" style="margin-top:4px;"><strong>当前X值：</strong><code>${r.xValue}</code></div>
        `;
        candidateGridEl.appendChild(card);
      });

      candidateBlockEl.style.display = "block";
    }

    function renderTable(result){
      tbodyEl.innerHTML = "";
      const bestSeat = result.hits[0]?.seat || null;
      const secondSeats = result.hits.slice(1).map(x => x.seat);

      result.rows.forEach(r => {
        const tr = document.createElement("tr");
        if (r.seat === bestSeat) tr.classList.add("bestRow");
        else if (secondSeats.includes(r.seat)) tr.classList.add("secondRow");

        tr.innerHTML = `
          <td>${r.seat}号</td>
          <td><code>${r.requiredXValues}</code></td>
          <td><code>${r.xValue}</code></td>
          <td class="${r.cls}">${r.isHit ? "✓ 匹配" : "✗ 不匹配"}</td>
        `;
        tbodyEl.appendChild(tr);
      });

      detailBlockEl.style.display = "block";
    }

    function renderSummary(result){
      summaryEl.style.display = "block";
      finalSeatEl.textContent = result.finalSeat;
      finalSubEl.textContent =
        `A=${result.A} B=${result.B} C=${result.C} D=${result.D} E=${result.E}\n${result.finalDesc}`;
    }

    function loadHistory(){
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveHistory(items){
      localStorage.setItem(HISTORY_KEY, JSON.stringify(items.slice(0, HISTORY_LIMIT)));
    }

    function pushHistory(room, result){
      const items = loadHistory();
      const hitSeats = result.hits.length > 0 
        ? result.hits.map(h => `${h.seat}号`).join(", ")
        : "跳";
      
      items.unshift({
        room,
        seats: hitSeats,
        desc: result.finalDesc,
        time: new Date().toLocaleString("zh-CN", { hour12:false })
      });
      saveHistory(items);
      renderHistory();
    }

    function renderHistory(){
      const items = loadHistory();
      historyListEl.innerHTML = "";

      if(items.length === 0){
        historyListEl.innerHTML = `<div class="historyItem"><div class="historyMain" style="color:rgba(255,255,255,.55)">暂无记录</div></div>`;
        return;
      }

      items.forEach(item => {
        const div = document.createElement("div");
        div.className = "historyItem";
        div.innerHTML = `
          <div class="historyTop">
            <div>房号：<span class="pill">${item.room}</span></div>
            <div>${item.time}</div>
          </div>
          <div class="historyMain">
            <div><strong>结果：</strong>${item.seats}</div>
            <div style="color:rgba(255,255,255,.7); white-space:pre-line;">${item.desc}</div>
          </div>
        `;
        historyListEl.appendChild(div);
      });
    }

    function run(){
      const s = roomEl.value.trim().replace(/\s+/g, "");
      if(!/^\d{5}$/.test(s)){
        msgEl.textContent = "请输入正确的5位数字（例如：74759）";
        summaryEl.style.display = "none";
        detailBlockEl.style.display = "none";
        candidateBlockEl.style.display = "none";
        return;
      }

      msgEl.textContent = "";
      const result = analyze(s);
      renderSummary(result);
      renderCandidates(result);
      renderTable(result);
      pushHistory(s, result);

      setTimeout(() => {
        roomEl.value = "";
        roomEl.focus();
      }, 250);
    }

    goEl.addEventListener("click", run);
    roomEl.addEventListener("keydown", e => {
      if(e.key === "Enter") run();
    });

    clearHistoryEl.addEventListener("click", () => {
      localStorage.removeItem(HISTORY_KEY);
      renderHistory();
    });

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }

    renderHistory();
    roomEl.focus();
  </script>
</body>
</html>
